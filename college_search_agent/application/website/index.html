<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#212121" />
    <title>College Search Agent</title>
    <link rel="stylesheet" href="/static/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <!-- Markdown renderer -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <!-- HTML sanitiser (prevents XSS in rendered markdown) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.5/purify.min.js"></script>
</head>

<body>
    <!-- Mobile overlay (tapping closes sidebar) -->
    <div class="overlay" id="overlay"></div>

    <!-- ─────────────────── SIDEBAR ─────────────────── -->
    <aside class="sidebar" id="sidebar" aria-label="Conversation history">
        <!-- Sidebar top actions -->
        <div class="sidebar-top">
            <button class="icon-btn" id="sidebarCollapseBtn" title="Close sidebar" aria-label="Toggle sidebar">
                <!-- hamburger -->
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round">
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <line x1="3" y1="12" x2="21" y2="12" />
                    <line x1="3" y1="18" x2="21" y2="18" />
                </svg>
            </button>

            <button class="icon-btn" id="newChatBtn" title="New chat" aria-label="Start new chat">
                <!-- pencil / compose icon -->
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                </svg>
            </button>
        </div>

        <!-- Chat history list -->
        <div class="chat-history" id="chatHistory" role="list">
            <p class="history-empty" id="historyEmpty">No conversations yet</p>
        </div>

        <!-- Sidebar footer / brand -->
        <div class="sidebar-footer">
            <span class="brand-icon" aria-hidden="true">🎓</span>
            <span class="brand-name">College Agent</span>
        </div>
    </aside>

    <!-- ─────────────────── MAIN ─────────────────── -->
    <main class="main" id="main">

        <!-- Top bar (always visible, has items that only show on mobile) -->
        <header class="main-header">
            <button class="icon-btn" id="mobileMenuBtn" title="Open sidebar" aria-label="Open sidebar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round">
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <line x1="3" y1="12" x2="21" y2="12" />
                    <line x1="3" y1="18" x2="21" y2="18" />
                </svg>
            </button>

            <span class="header-title" id="headerTitle">College Search Agent</span>

            <button class="icon-btn" id="mobileNewChatBtn" title="New chat" aria-label="Start new chat">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                </svg>
            </button>
        </header>

        <!-- Welcome / empty-state screen -->
        <div class="welcome" id="welcome">
            <div class="welcome-inner">
                <div class="welcome-logo" aria-hidden="true">🎓</div>
                <h1 class="welcome-title">How can I help you today?</h1>
                <div class="suggestions" role="list">
                    <button class="suggestion" data-msg="What can you do?" role="listitem">
                        <span class="suggestion-title">What can you do?</span>
                        <span class="suggestion-sub">Discover my capabilities</span>
                    </button>
                    <button class="suggestion" data-msg="Find colleges for Computer Science with fees under 1 lakh"
                        role="listitem">
                        <span class="suggestion-title">CS colleges under ₹1 lakh</span>
                        <span class="suggestion-sub">Affordable engineering programs</span>
                    </button>
                    <button class="suggestion" data-msg="Find colleges where cutoff marks are below 90" role="listitem">
                        <span class="suggestion-title">Colleges by cutoff</span>
                        <span class="suggestion-sub">Search by entrance score</span>
                    </button>
                    <button class="suggestion" data-msg="Show me all available colleges" role="listitem">
                        <span class="suggestion-title">Browse all colleges</span>
                        <span class="suggestion-sub">See the full list of institutions</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Chat messages area -->
        <div class="messages-wrap" id="messagesWrap">
            <div class="messages" id="messages" role="log" aria-live="polite" aria-label="Chat messages"></div>
        </div>

        <!-- Input area -->
        <div class="input-area">
            <div class="input-box" id="inputBox">
                <textarea id="messageInput" placeholder='Message College Agent… (type //new to start a fresh session)'
                    rows="1" aria-label="Message input" autocomplete="off" autocorrect="off"
                    spellcheck="true"></textarea>
                <button class="send-btn" id="sendBtn" disabled aria-label="Send message" title="Send (Enter)">
                    <!-- Up-arrow send icon -->
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="19" x2="12" y2="5" />
                        <polyline points="5 12 12 5 19 12" />
                    </svg>
                </button>
            </div>
            <p class="input-hint">
                College Agent can make mistakes. Always verify important information.
            </p>
        </div>

    </main><!-- /.main -->

    <!-- App (ES module entry point) -->
    <script type="module" src="/static/app.js"></script>
</body>

</html>
