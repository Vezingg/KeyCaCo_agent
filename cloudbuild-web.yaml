steps:
  # Build the college search web chatbot image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-south1-docker.pkg.dev/keycaco/agent-repo/college-search-web:latest'
      - '-f'
      - 'Dockerfile.web'
      - '.'
    timeout: 1200s

  # Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-south1-docker.pkg.dev/keycaco/agent-repo/college-search-web:latest'
    timeout: 1200s

images:
  - 'asia-south1-docker.pkg.dev/keycaco/agent-repo/college-search-web:latest'

timeout: 1800s
options:
  machineType: 'E2_HIGHCPU_8'
